<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#02040a"/>
      <stop offset="50%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#02040a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#00ffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="42%" r="12%">
      <stop offset="0%" stop-color="#00ffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#02040a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#02040a" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00ffff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00ffff" stop-opacity="0.5"/>
      <stop offset="80%" stop-color="#00ffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#02040a" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid -->
  <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(0,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow -->
  <ellipse cx="600" cy="260" rx="500" ry="300" fill="url(#glow)" filter="url(#blur)"/>
  <ellipse cx="600" cy="260" rx="200" ry="150" fill="url(#coreGlow)" filter="url(#blur)"/>

  <!-- Hologram rings -->
  <circle cx="600" cy="260" r="120" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-opacity="0.25"/>
  <circle cx="600" cy="260" r="85" fill="none" stroke="#00ffff" stroke-width="1.2" stroke-opacity="0.35"/>
  <circle cx="600" cy="260" r="50" fill="none" stroke="#00ffff" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Orbital ellipses -->
  <ellipse cx="600" cy="260" rx="140" ry="60" fill="none" stroke="#00ffff" stroke-width="0.8" stroke-opacity="0.15" transform="rotate(-25 600 260)"/>
  <ellipse cx="600" cy="260" rx="130" ry="55" fill="none" stroke="#00ffff" stroke-width="0.8" stroke-opacity="0.15" transform="rotate(35 600 260)"/>
  <ellipse cx="600" cy="260" rx="150" ry="50" fill="none" stroke="#00ffff" stroke-width="0.8" stroke-opacity="0.12" transform="rotate(70 600 260)"/>

  <!-- Core dot -->
  <circle cx="600" cy="260" r="12" fill="#00ffff" opacity="0.6"/>
  <circle cx="600" cy="260" r="6" fill="#00ffff" opacity="0.9"/>

  <!-- Accent line -->
  <rect x="200" y="400" width="800" height="1.5" fill="url(#line)" rx="1"/>

  <!-- Title glow -->
  <text x="600" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#00ffff" opacity="0.2" filter="url(#textGlow)" letter-spacing="-2">Dockbox Voice</text>

  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">Dockbox Voice</text>

  <!-- Tagline -->
  <text x="600" y="505" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="24" font-weight="400" fill="#94a3b8" letter-spacing="1">Press a button. Talk to your Dockbox.</text>

  <!-- Pills -->
  <rect x="330" y="535" width="120" height="28" rx="14" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="390" y="554" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#67e8f9">Push-to-Talk</text>

  <rect x="465" y="535" width="115" height="28" rx="14" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="522" y="554" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#67e8f9">Local Speech</text>

  <rect x="595" y="535" width="100" height="28" rx="14" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="645" y="554" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#67e8f9">Hologram UI</text>

  <rect x="710" y="535" width="155" height="28" rx="14" fill="rgba(0,255,255,0.1)" stroke="#00ffff" stroke-opacity="0.25" stroke-width="1"/>
  <text x="787" y="554" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="12" font-weight="500" fill="#67e8f9">F9 from Anywhere</text>
</svg>
